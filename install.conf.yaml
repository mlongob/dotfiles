- clean: ['~']

- link:
    ~/.gitconfig: gitconfig
    ~/.gitignore_global: gitignore_global
    ~/.tmux.conf: tmux.conf
    ~/.tmux: tmux/
    ~/.vim: vim/
    ~/.vimrc: vimrc
    ~/.zsh: zsh/
    ~/.zprofile: zprofile
    ~/.zshrc: zshrc
    ~/.config/starship/starship.toml:
        path: config/starship/starship.toml
        create: true

- shell:
    - [git submodule update --init --recursive, Updating submodules]
    - command: brew install zsh-autosuggestions zsh-syntax-highlighting fzf zoxide starship
      stdin: true
      stdout: true
      stderr: true
    - command: vim +PlugInstall +qall
      stdin: true
      stdout: true
      stderr: true
    - command: ~/.tmux/plugins/tpm/bin/install_plugins
      stdin: true
      stdout: true
      stderr: true
