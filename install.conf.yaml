- clean: ['~']

- link:
    ~/.gitconfig: gitconfig
    ~/.gitignore_global: gitignore_global
    ~/.tmux.conf: tmux.conf
    ~/.tmux: tmux/
    ~/.vim: vim/
    ~/.vimrc: vimrc
    ~/.zsh: zsh/
    ~/.zprofile:
        path: zprofile
        force: true
    ~/.zshrc:
        path: zshrc
        force: true
    ~/.config/starship.toml:
        path: config/starship/starship.toml
        force: true
    ~/.config/ghostty/config:
        path: config/ghostty/config
        create: true
    ~/.dotfiles/bin:
        path: bin/
        create: true

- shell:
    - [git submodule update --init --recursive, Updating submodules]
    - command: brew bundle --file=~/.dotfiles/Brewfile
      stdin: true
      stdout: true
      stderr: true
      description: Installing Homebrew packages
    - command: >
        curl -fLo ~/.vim/autoload/plug.vim --create-dirs
        https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
      stdout: true
      stderr: true
      description: Installing vim-plug
    - command: vim +PlugInstall +qall
      stdin: true
      stdout: true
      stderr: true
    - command: >
        tmux new-session -d -s __install__ 2>/dev/null;
        ~/.tmux/plugins/tpm/bin/install_plugins;
        tmux kill-session -t __install__ 2>/dev/null;
        true
      stdout: true
      stderr: true
      description: Installing tmux plugins via TPM
    - command: ~/.dotfiles/macos/defaults.sh
      stdout: true
      stderr: true
      description: Applying macOS defaults
