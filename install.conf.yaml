- clean: ['~']

- link:
    ~/.hushlogin: hushlogin
    ~/.gitconfig: gitconfig
    ~/.gitignore_global: gitignore_global
    ~/.tmux.conf: tmux.conf
    ~/.tmux: tmux/
    ~/.vim: vim/
    ~/.vimrc: vimrc
    ~/.zsh: zsh/
    ~/.zprofile:
        path: zprofile
        force: true
    ~/.zshrc:
        path: zshrc
        force: true
    ~/.config/starship.toml:
        path: config/starship/starship.toml
        force: true
    ~/.config/ghostty/config:
        path: config/ghostty/config
        create: true
    ~/Library/Application Support/Code/User/settings.json:
        path: config/vscode/settings.json
        force: true
        create: true
    ~/.config/bat/themes:
        path: config/bat/themes
        force: true
        create: true
    ~/.config/btop/btop.conf:
        path: config/btop/btop.conf
        force: true
        create: true
    ~/.config/btop/themes:
        path: config/btop/themes
        force: true
        create: true
    ~/.config/mise/config.toml:
        path: config/mise/config.toml
        create: true
    ~/.claude/settings.json:
        path: config/claude/settings.json
        force: true
        create: true
    ~/.claude/CLAUDE.md:
        path: config/claude/CLAUDE.md
        force: true
        create: true
    ~/.claude/statusline-command.sh:
        path: config/claude/statusline-command.sh
        force: true
        create: true


- shell:
    - [git submodule update --init --recursive, Updating submodules]
    - command: >
        if [ ! -d "$HOME/.oh-my-zsh" ]; then
          sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended --keep-zshrc
        fi
      stdout: true
      stderr: true
      description: Installing oh-my-zsh
    - command: brew bundle --file=~/.dotfiles/Brewfile
      stdin: true
      stdout: true
      stderr: true
      description: Installing Homebrew packages
    - command: mise install --yes
      stdin: true
      stdout: true
      stderr: true
      description: Installing mise-managed runtimes (node, etc.)
    - command: >
        curl -fLo ~/.vim/autoload/plug.vim --create-dirs
        https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
      stdout: true
      stderr: true
      description: Installing vim-plug
    - command: vim +PlugInstall +qall
      stdin: true
      stdout: true
      stderr: true
    - command: >
        tmux new-session -d -s __install__ 2>/dev/null;
        ~/.tmux/plugins/tpm/bin/install_plugins;
        tmux kill-session -t __install__ 2>/dev/null;
        true
      stdout: true
      stderr: true
      description: Installing tmux plugins via TPM
    - command: bat cache --build
      stdout: true
      stderr: true
      description: Rebuilding bat theme cache
    - command: ~/.dotfiles/macos/defaults.sh
      stdout: true
      stderr: true
      description: Applying macOS defaults
    - command: >
        if command -v code &>/dev/null; then
          grep -v '^#' ~/.dotfiles/config/vscode/extensions.txt | grep -v '^$' |
          xargs -L1 code --install-extension --force 2>/dev/null; true
        fi
      stdout: true
      stderr: true
      description: Installing VS Code extensions
