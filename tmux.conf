## ============================================================================
##                          Tmux Configuration File
## ============================================================================

## ============================================================================
##                               Key Bindings
## ============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Pane navigation (vim-style with vim-tmux-navigator awareness)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Re-bind clear screen (since C-l is taken)
bind C-l send-keys 'C-l'

# Prefix + vim keys for pane navigation too
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resizing
bind-key s resize-pane -x 98
bind-key S resize-pane -y 12

# Synchronize panes
bind-key C-s set-window-option synchronize-panes

## ============================================================================
##                                 Settings
## ============================================================================

# 256 colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Vi mode
setw -g mode-keys vi
set -g status-keys vi

# Mouse support
set -g mouse on

# Longer scrollback
set -g history-limit 50000

# No delay for escape key
set -sg escape-time 10

# Window/pane indexing from 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

set-window-option -g xterm-keys on

## ============================================================================
##                               Plugins (TPM)
## ============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'

## ============================================================================
##                               Status Bar (catppuccin)
## ============================================================================
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

# Load catppuccin before defining status line
run '~/.tmux/plugins/tmux/catppuccin.tmux'

set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Allow local customization
if-shell "[ -f ~/.tmux_local.conf ]" 'source ~/.tmux_local.conf'

# Initialize TPM — keep this at the very bottom
run-shell '~/.tmux/plugins/tpm/tpm'
